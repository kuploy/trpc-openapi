name: Publish to GitHub Packages

# Publishes @kuploy/trpc-openapi to GitHub Packages. Triggers:
#   - a v* tag push (the canonical release path), or
#   - a manual workflow_dispatch, or
#   - a push to main whose head commit message contains "[publish]"
#     (an escape hatch for environments where tag pushes / dispatch are
#     unavailable; ordinary main pushes without the marker stay inert).
#
# Auth: GITHUB_TOKEN (packages: write). The package already exists and is
# linked to this repo (the first publish, 0.0.6, ran from this workflow with a
# PACKAGES_PAT because GITHUB_TOKEN cannot *create* a new org package), so
# GITHUB_TOKEN now covers subsequent publishes. Consumers install from the
# @kuploy-scoped GitHub Packages registry with a read:packages token.
on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v') ||
      contains(github.event.head_commit.message, '[publish]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: "https://npm.pkg.github.com"
          scope: "@kuploy"
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm run build
      - run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
